<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Float Tank — The House of Arete</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/magic.css">
<link rel="stylesheet" href="styles/room-card.css">
</head>
<body>
  <a class="room-back" href="whimsy.html">← back to the house</a>

  <div class="room-page" data-screen-label="Float Tank">
    <article class="room-card">
      <h1 class="room-title">
        <span class="ornament">❦</span>
        Float Tank
        <span class="ornament">❦</span>
      </h1>

      <figure class="room-photo">
        <div class="placeholder">float tank photograph</div>
      </figure>

      <p class="room-tagline">Weightless, soundless, timeless — a room without edges.</p>

      <div class="room-icons">
        <div class="room-icon">
          <span class="glyph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <ellipse cx="12" cy="12" rx="9" ry="5"/>
              <path d="M3 12c2-2 16-2 18 0"/>
            </svg>
          </span>
          <span class="label">1000 lbs Salt</span>
        </div>
        <div class="room-icon">
          <span class="glyph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12a7 7 0 0 0 14 0"/>
              <path d="M12 5v7"/>
            </svg>
          </span>
          <span class="label">Skin Temp</span>
        </div>
        <div class="room-icon">
          <span class="glyph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12h4l3-7 4 14 3-7h4"/>
            </svg>
          </span>
          <span class="label">60 Min Drift</span>
        </div>
      </div>

      <div class="embers" id="embers"></div>
    </article>
  </div>

<script src="scripts/embers.js"></script>
<script>seedEmbers(document.getElementById('embers'), 22);</script>
