<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>The House of Arete — Step Inside</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/magic.css">
</head>
<body>
  <div class="page-frame">
    <div class="stage" id="stage" data-screen-label="01 House Index" data-mode="whimsy">
      <!-- Light-mode base goes here when you have it; falls back to whimsy for now -->
      <img class="base light"  src="assets/house-light.png" alt="The House of Arete (daylight)"
           onerror="this.style.display='none'" />
      <img class="base whimsy" src="assets/house-base.png"  alt="The House of Arete (night)" />

      <!-- Mode toggle pill -->
      <div class="mode-toggle" id="modeToggle" data-mode="whimsy">
        <span class="pill-knob"></span>
        <a href="/" data-mode="light">Light</a>
        <button type="button" data-mode="whimsy" class="active">Whimsy</button>
      </div>


      <!-- Sky / stars layer (procedurally filled) -->
      <div class="sky" id="sky"></div>

      <!-- Window glow overlays — positioned in % over each room.
           Tweak these once you have a 'lights off' base PNG. -->
      <div class="glow window" style="left:24%; top:42%; width:90px; height:90px; --dur:5.5s; --delay:0.2s;"></div>
      <div class="glow window" style="left:50%; top:42%; width:85px; height:85px; --dur:6.0s; --delay:0.8s;"></div>
      <div class="glow window" style="left:24%; top:62%; width:95px; height:95px; --dur:5.0s; --delay:0.4s;"></div>
      <div class="glow window" style="left:46%; top:62%; width:70px; height:70px; --dur:4.5s; --delay:1.1s;"></div>
      <div class="glow window" style="left:64%; top:62%; width:90px; height:90px; --dur:5.2s; --delay:0.6s;"></div>

      <!-- Candle flames — small, fast flicker -->
      <div class="glow candle" style="left:35%; top:51%; width:14px; height:14px;"></div>
      <div class="glow candle" style="left:39%; top:53%; width:10px; height:10px; animation-delay:-0.07s;"></div>
      <div class="glow candle" style="left:55%; top:73%; width:12px; height:12px;"></div>
      <div class="glow candle" style="left:81%; top:74%; width:14px; height:14px;"></div>
      <div class="glow candle" style="left:18%; top:73%; width:10px; height:10px;"></div>

      <!-- Fireflies (procedurally filled) -->
      <div class="fireflies" id="fireflies"></div>

      <!-- Room hotspots — invisible clickable zones over each room -->
      <a class="hotspot" data-label="Massage Room"  href="whimsy_massage.html"
         style="left:18%; top:38%; width:25%; height:18%;"></a>
      <a class="hotspot" data-label="Contrast Therapy"   href="whimsy_cold-plunge.html"
         style="left:44%; top:38%; width:25%; height:18%;"></a>
      <a class="hotspot" data-label="Retail Room"   href="whimsy_retail.html"
         style="left:11%; top:58%; width:27%; height:19%;"></a>
      <a class="hotspot" data-label="Sauna Room"    href="whimsy_sauna.html"
         style="left:39%; top:58%; width:18%; height:19%;"></a>
      <a class="hotspot" data-label="Float Tank"    href="whimsy_float.html"
         style="left:58%; top:58%; width:25%; height:19%;"></a>

      <div class="vignette"></div>
      <div class="scene-hint">hover the rooms · click to enter</div>
      <div class="scene-label">prototype · ambient layer over your art</div>
    </div>
  </div>

<script src="scripts/magic.js"></script>
<script>
  const stage = document.querySelector('.stage');
  Magic.seedStars(document.getElementById('sky'), 140);
  Magic.seedFireflies(document.getElementById('fireflies'), 14);
  Magic.seedStringLights(stage, { count: 22, topPct: 80, leftStart: 6, leftEnd: 94 });

  // Mode toggle
  const modeToggle = document.getElementById('modeToggle');
  const stageEl = document.getElementById('stage');
  modeToggle.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-mode]');
    if (!btn) return;
    const mode = btn.dataset.mode;
    stageEl.dataset.mode = mode;
    modeToggle.dataset.mode = mode;
    modeToggle.querySelectorAll('button').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === mode);
    });
  });
</script>
</body>
</html>
