<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Sauna — The House of Arete</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/magic.css">
<link rel="stylesheet" href="styles/room-card.css">
</head>
<body>
  <a class="room-back" href="whimsy.html">← back to the house</a>

  <div class="room-page" data-screen-label="Sauna">
    <article class="room-card">
      <h1 class="room-title">
        <span class="ornament">❦</span>
        Sauna
        <span class="ornament">❦</span>
      </h1>

      <figure class="room-photo">
        <div class="placeholder">sauna photograph</div>
      </figure>

      <p class="room-tagline">Cedar, smoke, and the slow surrender of every held thing.</p>

      <div class="room-icons">
        <div class="room-icon">
          <span class="glyph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21c-3-4-3-7 3-12-2 6 4 6 0 12"/>
              <path d="M14 21c-2-3-1-5 2-8-1 4 2 4 0 8"/>
            </svg>
          </span>
          <span class="label">180° F</span>
        </div>
        <div class="room-icon">
          <span class="glyph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 20V8l8-5 8 5v12"/>
              <path d="M4 12h16M9 20v-6h6v6"/>
            </svg>
          </span>
          <span class="label">Cedar Built</span>
        </div>
        <div class="room-icon">
          <span class="glyph">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="9"/>
              <path d="M12 7v5l3 2"/>
            </svg>
          </span>
          <span class="label">15 Min Sessions</span>
        </div>
      </div>

      <div class="embers" id="embers"></div>
    </article>
  </div>

<script src="scripts/embers.js"></script>
<script>seedEmbers(document.getElementById('embers'), 22);</script>
</body>
</html>
