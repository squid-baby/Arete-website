  <!--
    =====================================================================
    HOW TO UPDATE THE FAQ
    =====================================================================
    Edit the JSON below. The page renders from this list AND the
    FAQPage JSON-LD schema is generated from the same data, so Google
    always sees the same answers visitors see.

    Each group has: { id, title, items: [ { q, a } ] }
    "a" supports basic <a href> markup but keep answers plain-text
    where possible. Schema requires text-only.
    =====================================================================
  -->
  <script type="application/json" id="faq-data">
  [
    {
      "id": "floating",
      "title": "Floating",
      "items": [
        {
          "q": "What does floating actually feel like?",
          "a": "You lie back in roughly ten inches of skin-temperature water saturated with 1,000 lbs of Epsom salt. The salt makes you completely buoyant — your body floats effortlessly on the surface, ears submerged, with the option to keep the lights on or turn them off entirely. Most people describe the first 10–15 minutes as adjustment, then a deep, almost dreamlike calm settles in. It is not like a swimming pool. It is closer to gravity-free meditation."
        },
        {
          "q": "Is it safe? Can I drown?",
          "a": "Floating is extremely safe. The salt content is so high that you cannot sink — even if you fell asleep (which many guests do), you would simply float on. The water is only ten inches deep. The room is fully private and lockable, but staff are always nearby."
        },
        {
          "q": "What should I bring? What should I wear?",
          "a": "Just yourself. We provide towels, earplugs, body wash, conditioner, blow dryer, and Q-tips. Most guests float nude — the room is fully private — but a swimsuit is welcome if you prefer."
        },
        {
          "q": "Can I float if I'm pregnant, claustrophobic, or have a medical condition?",
          "a": "Floating is generally excellent during the second and third trimesters of pregnancy — the gravity relief is meaningful — but please get clearance from your OB first. The float room is large and the door is unlocked from inside, so most guests with mild claustrophobia are comfortable. If you have open wounds, dyed hair within the last week, contagious skin conditions, or uncontrolled epilepsy, please reschedule. When in doubt, call us at 919-636-9899."
        }
      ]
    },
    {
      "id": "sauna",
      "title": "Sauna & Heat",
      "items": [
        {
          "q": "What's the difference between infrared and traditional sauna?",
          "a": "Traditional saunas heat the air around you — typically 180–200°F. Our infrared saunas heat your body directly with light wavelengths at a more comfortable 130–150°F. The result is a deeper, lower-stress sweat that most people find easier to tolerate for a full 30–45 minute session. It also pairs beautifully with cold plunge for contrast therapy."
        },
        {
          "q": "How often should I sauna?",
          "a": "The research on cardiovascular and longevity benefits clusters around 3–4 sessions per week, 20–45 minutes each. Once a week is still meaningful. Daily is fine for most healthy adults. If you're new, start with 20 minutes and build up."
        },
        {
          "q": "Should I drink water before or after?",
          "a": "Both. Hydrate well in the hour before, and replace electrolytes after — we keep mineral water and electrolyte tabs at the front. Avoid alcohol before sauna; it dehydrates you and blunts the benefits."
        }
      ]
    },
    {
      "id": "contrast",
      "title": "Contrast Therapy",
      "items": [
        {
          "q": "How cold is the cold plunge?",
          "a": "Our cold plunge is held between 38°F and 50°F, depending on the time of year. The protocol most guests follow is 10–15 minutes in the sauna, 1–3 minutes in the plunge, repeated 2–3 times. Your first plunge will feel like a lot. By your third, your nervous system will have adjusted and most people report feeling extraordinary for the rest of the day."
        },
        {
          "q": "Is cold plunging safe for everyone?",
          "a": "Cold immersion is intense and not for everyone. If you have heart conditions, uncontrolled high blood pressure, are pregnant, or have Raynaud's, please skip the plunge or check with your physician first. Always enter slowly, control your breathing, and exit when you feel ready — never push past genuine discomfort."
        },
        {
          "q": "How long should I stay in?",
          "a": "60 seconds to 3 minutes per round is plenty. The benefits plateau quickly; longer is not better. If you can hold steady, controlled breathing for the full minute, you have done the work."
        }
      ]
    },
    {
      "id": "massage",
      "title": "Massage",
      "items": [
        {
          "q": "What kinds of massage do you offer?",
          "a": "Swedish for general relaxation, deep tissue for chronic tension and recovery, and curated recovery sessions that pair massage with infrared sauna or cold plunge. Our therapists are state-licensed and trained across multiple modalities — let us know your goals at booking and we'll match you to the right person."
        },
        {
          "q": "Should I float, sauna, or plunge before or after my massage?",
          "a": "Either order works. Most guests prefer to float or sauna first — your muscles are warmer and more pliable, which makes the bodywork more effective. Cold plunge is best after, to bookend the session and lock in recovery."
        }
      ]
    },
    {
      "id": "visiting",
      "title": "Booking & Visiting",
      "items": [
        {
          "q": "How early should I arrive?",
          "a": "Please arrive 10–15 minutes before your first session so we can show you around and answer questions. After your first visit, 5 minutes is plenty."
        },
        {
          "q": "What's your cancellation policy?",
          "a": "Sessions can be rescheduled or cancelled up to 24 hours in advance with no charge. Inside 24 hours, the session is charged in full so we can pay our team for the held time. Memberships have their own terms — see the membership page."
        },
        {
          "q": "Do you offer memberships, packages, or gift cards?",
          "a": "Yes to all three. Memberships include monthly sessions plus member-only pricing on add-ons; packages bundle 5 or 10 visits at a discount. Gift cards in any amount are available at the front desk or online. Visit our memberships page for current pricing."
        },
        {
          "q": "Where are you, and where do I park?",
          "a": "We're at 213 E. Braxton Foushee Street in Carrboro, NC — the building with the warm windows on the corner of Maple Ave. Free parking on the street and in the lot directly across. We're a short walk from Weaver Street Market and the Carrboro Farmers' Market."
        }
      ]
    }
  ]
