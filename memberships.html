  <style>
    /* =========================================================
       Memberships — page-local styles
       ========================================================= */

    /* Hero meta panel — three small "why a membership" tiles */
    .mb-why {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      max-width: 1100px;
      margin: 0 auto;
      padding: 56px 48px;
      border-top: 1px solid var(--ink-14);
      border-bottom: 1px solid var(--ink-14);
    }
    .mb-why--mobile {
      grid-template-columns: 1fr;
      padding: 36px 24px;
    }
    .mb-why__cell {
      padding: 0 28px;
      border-right: 1px solid var(--ink-14);
    }
    .mb-why__cell:first-child { padding-left: 0; }
    .mb-why__cell:last-child { border-right: none; padding-right: 0; }
    .mb-why--mobile .mb-why__cell {
      border-right: none;
      border-bottom: 1px solid var(--ink-14);
      padding: 22px 0;
    }
    .mb-why--mobile .mb-why__cell:last-child { border-bottom: none; }
    .mb-why__icon {
      font-family: var(--display-font);
      font-style: italic;
      font-size: 32px;
      line-height: 1;
      color: var(--candle);
      margin-bottom: 14px;
    }
    .mb-why__kicker {
      display: block;
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink-55);
      margin-bottom: 8px;
    }
    .mb-why__title {
      font-family: var(--display-font);
      font-size: 22px;
      letter-spacing: -0.005em;
      margin-bottom: 8px;
      line-height: 1.15;
    }
    .mb-why__body {
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--ink-70);
    }
    .mb-why__cite {
      display: block;
      margin-top: 8px;
      font-family: 'GT America Mono', 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--ink-55);
    }

    /* Sticky modality nav */
    .mb-jump {
      position: sticky;
      top: 0;
      z-index: 30;
      background: color-mix(in srgb, var(--bg) 92%, transparent);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--ink-14);
    }
    .mb-jump__inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 48px;
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .mb-jump--mobile .mb-jump__inner {
      padding: 12px 16px;
      gap: 18px;
      overflow-x: auto;
      flex-wrap: nowrap;
      justify-content: flex-start;
    }
    .mb-jump a {
      color: var(--ink-55);
      padding: 6px 0;
      border-bottom: 1px solid transparent;
      transition: color .25s, border-color .25s;
      white-space: nowrap;
    }
    .mb-jump a:hover {
      color: var(--ink);
      border-bottom-color: var(--candle);
    }
    .mb-jump__count {
      font-family: 'GT America Mono', monospace;
      font-size: 9.5px;
      color: var(--candle);
      margin-right: 4px;
    }

    /* Modality section */
    .mod {
      padding: 96px 48px 72px;
      max-width: 1180px;
      margin: 0 auto;
      scroll-margin-top: 70px;
    }
    .mod--mobile {
      padding: 64px 20px 40px;
    }
    .mod__head {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 48px;
      align-items: end;
      margin-bottom: 40px;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--ink-14);
    }
    .mod--mobile .mod__head {
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 28px;
    }
    .mod__index {
      font-family: 'GT America Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--candle);
    }
    .mod__title {
      font-family: var(--display-font);
      font-weight: 400;
      font-size: clamp(36px, 4vw, 56px);
      line-height: 1;
      letter-spacing: -0.01em;
    }
    .mod__title em {
      font-style: italic;
      color: var(--candle);
    }
    .mod__lede {
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink-70);
      max-width: 56ch;
      margin-top: 12px;
    }

    /* Card grid — auto adapts */
    .mb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }
    .mb-grid--two { grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
    .mod--mobile .mb-grid { grid-template-columns: 1fr; gap: 14px; }

    /* Membership card */
    .mp {
      --mp-color: var(--candle);
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--paper);
      border: 1px solid var(--ink-14);
      border-radius: 14px;
      padding: 26px 26px 22px;
      transition: transform .35s ease, box-shadow .35s ease, border-color .35s ease;
      overflow: hidden;
    }
    .mp::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--mp-color);
      opacity: 0.85;
    }
    .mp:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px -22px rgba(13,27,62,0.22);
      border-color: color-mix(in srgb, var(--mp-color) 40%, var(--ink-14));
    }
    .mp__top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }
    .mp__name {
      font-family: var(--display-font);
      font-size: 26px;
      line-height: 1.1;
      letter-spacing: -0.005em;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .mp__cadence {
      font-family: 'GT America Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--mp-color);
    }
    .mp__price {
      text-align: right;
      flex-shrink: 0;
      line-height: 1;
    }
    .mp__price-num {
      font-family: var(--display-font);
      font-size: 44px;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .mp__price-num sup {
      font-size: 18px;
      vertical-align: top;
      margin-right: 1px;
      letter-spacing: 0;
    }
    .mp__price-unit {
      display: block;
      font-family: 'GT America Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-55);
      margin-top: 6px;
    }
    .mp__save {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      align-self: flex-start;
      padding: 5px 10px;
      border-radius: 100px;
      background: color-mix(in srgb, var(--mp-color) 12%, var(--paper));
      border: 1px solid color-mix(in srgb, var(--mp-color) 30%, var(--ink-14));
      color: color-mix(in srgb, var(--mp-color) 60%, var(--ink));
      font-size: 11px;
      letter-spacing: 0.05em;
      margin-bottom: 18px;
    }
    .mp__save b {
      font-weight: 500;
      letter-spacing: 0;
    }
    .mp__save--neutral {
      background: var(--ink-06);
      border-color: var(--ink-14);
      color: var(--ink-70);
    }

    .mp__list {
      list-style: none;
      padding: 0;
      margin: 0 0 20px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      flex: 1;
    }
    .mp__list li {
      display: grid;
      grid-template-columns: 14px 1fr;
      gap: 10px;
      align-items: baseline;
      font-size: 13.5px;
      line-height: 1.5;
      color: var(--ink);
    }
    .mp__list li::before {
      content: "";
      display: block;
      width: 6px;
      height: 6px;
      margin-top: 7px;
      border-radius: 50%;
      background: var(--mp-color);
      opacity: 0.65;
    }
    .mp__list .is-quiet {
      color: var(--ink-70);
      font-size: 12.5px;
    }

    .mp__chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 18px;
    }
    .mp__chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 100px;
      background: var(--ink-06);
      border: 1px solid var(--ink-14);
      font-size: 10.5px;
      letter-spacing: 0.06em;
      color: var(--ink-70);
      text-transform: none;
    }
    .mp__chip--off {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .mp__cta {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 18px;
      border-top: 1px solid var(--ink-14);
    }
    .mp__signup {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--ink);
      color: var(--bg);
      border: 1px solid var(--ink);
      border-radius: 2px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: background .3s, color .3s, transform .3s;
    }
    .mp__signup:hover {
      background: transparent;
      color: var(--ink);
    }
    .mp__signup svg { transition: transform .3s; }
    .mp__signup:hover svg { transform: translateX(4px); }
    .mp__fine {
      font-family: 'GT America Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: var(--ink-55);
      text-align: right;
    }

    /* Featured: Ultimate Wellness */
    .mp--feature {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 0;
      padding: 0;
      background: var(--ink);
      color: var(--bg);
      border: 1px solid var(--ink);
    }
    .mp--feature::before { display: none; }
    .mod--mobile .mp--feature { grid-template-columns: 1fr; }
    .mp--feature .mp__feature-body {
      padding: 38px 36px 32px;
      display: flex;
      flex-direction: column;
    }
    .mp--feature .mp__feature-side {
      padding: 38px 36px 32px;
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--candle) 22%, var(--ink)) 0%,
        var(--ink) 80%);
      border-left: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 22px;
    }
    .mod--mobile .mp--feature .mp__feature-side {
      border-left: none;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .mp--feature .mp__name { color: var(--bg); font-size: 36px; }
    .mp--feature .mp__cadence { color: var(--candle); }
    .mp--feature .mp__list li { color: rgba(244,237,226,0.9); }
    .mp--feature .mp__list li::before { background: var(--candle); opacity: 1; }
    .mp--feature .mp__price-num { color: var(--bg); font-size: 64px; }
    .mp--feature .mp__price-unit { color: rgba(244,237,226,0.55); }
    .mp--feature .mp__save {
      background: rgba(244,237,226,0.08);
      border-color: rgba(244,237,226,0.18);
      color: var(--candle);
    }
    .mp--feature .mp__chip {
      background: rgba(244,237,226,0.06);
      border-color: rgba(244,237,226,0.14);
      color: rgba(244,237,226,0.75);
    }
    .mp--feature .mp__cta { border-top-color: rgba(244,237,226,0.12); }
    .mp--feature .mp__signup {
      background: var(--candle);
      color: var(--ink);
      border-color: var(--candle);
    }
    .mp--feature .mp__signup:hover {
      background: transparent;
      color: var(--candle);
    }
    .mp--feature .mp__fine { color: rgba(244,237,226,0.55); }
    .mp__feature-flag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      align-self: flex-start;
