<body>
  <div class="star-field" id="starField"></div>
  <div class="whimsy-orb orb-1"></div>
  <div class="whimsy-orb orb-2"></div>
  <div class="whimsy-orb orb-3"></div>
  <div class="mode-flash" id="modeFlash"></div>
  <div id="root"></div>
  <script>
    (function(){
      const sf = document.getElementById('starField');
      for (let i = 0; i < 100; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const sz = Math.random() * 2 + 1;
        s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;--dur:${Math.random()*3+2}s;--delay:${Math.random()*3}s;--min-o:${Math.random()*0.3+0.1};--max-o:${Math.random()*0.5+0.4};`;
        sf.appendChild(s);
      }
      const toggle = document.getElementById('modeToggle');
      const flash = document.getElementById('modeFlash');
      toggle.addEventListener('click', () => {
        flash.classList.add('on');
        setTimeout(() => { window.location.href = 'whimsy_retail.html'; }, 250);
      });
    })();
  </script>
