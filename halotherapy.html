  <style>
    /* =========================================================
       Halotherapy — page-local styles
       ========================================================= */

    /* Salt radial section ----------------------------------- */
    .ht-radial {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
      align-items: center;
    }
    .timeline--mobile .ht-radial {
      grid-template-columns: 1fr;
      gap: 36px;
    }

    .ht-radial__diagram {
      background: var(--paper);
      border: 1px solid var(--ink-14, rgba(13,27,62,0.14));
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 12px 30px -20px rgba(13,27,62,0.18);
    }

    .ht-radial__cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .ht-quad {
      --quad-color: rgb(232,155,142);
      text-align: left;
      cursor: pointer;
      background: var(--paper);
      border: 1px solid var(--ink-14, rgba(13,27,62,0.14));
      border-left: 3px solid transparent;
      border-radius: 10px;
      padding: 14px 18px;
      transition: border-color .35s ease, background .35s ease, transform .35s ease;
      font-family: inherit;
      color: inherit;
    }
    .ht-quad:hover { transform: translateY(-1px); }
    .ht-quad.is-on {
      border-left-color: var(--quad-color);
      background: linear-gradient(90deg,
        color-mix(in srgb, var(--quad-color) 9%, var(--paper)) 0%,
        var(--paper) 80%);
    }
    .ht-quad__head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .ht-quad__title {
      font-family: var(--display-font);
      font-size: 22px;
      letter-spacing: -0.01em;
      color: var(--quad-color);
      line-height: 1;
    }
    .ht-quad__kicker {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-70, rgba(13,27,62,0.7));
    }
    .ht-quad__job {
      font-size: 14px;
      line-height: 1.6;
      color: var(--ink, #0d1b3e);
      margin: 0;
      max-width: 44ch;
    }

    /* Citations row ----------------------------------------- */
    .rl-cite {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-family: 'GT America Mono', 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--ink-70, rgba(13,27,62,0.6));
    }
    .rl-cite sup { margin-right: 4px; }

    /* Pricing — single add-on card -------------------------- */
    .ht-pricing {
      max-width: 900px;
      margin: 0 auto;
    }
    .ht-pricing__card {
      position: relative;
      background: var(--paper);
      border: 1px solid var(--ink-14, rgba(13,27,62,0.14));
      border-radius: 14px;
      padding: 36px 40px 28px;
      box-shadow: 0 12px 30px -20px rgba(13,27,62,0.18);
    }
    .pricing--mobile .ht-pricing__card {
      padding: 28px 24px 22px;
    }
    .ht-pricing__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .pricing--mobile .ht-pricing__row {
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }
    .ht-pricing__name {
      font-family: var(--display-font);
      font-weight: 400;
      font-size: clamp(28px, 2.4vw, 36px);
      line-height: 1.1;
      margin: 0 0 8px;
      color: var(--ink, #0d1b3e);
      letter-spacing: -0.01em;
    }
    .ht-pricing__sub {
      font-size: 14.5px;
      line-height: 1.6;
      max-width: 46ch;
      margin: 0;
      color: var(--ink-70, rgba(13,27,62,0.75));
    }
    .ht-pricing__price {
      display: flex;
      align-items: baseline;
      gap: 6px;
      color: var(--candle, #E89B8E);
      line-height: 1;
    }
    .ht-pricing__plus {
      font-family: var(--display-font);
      font-size: 56px;
      line-height: 1;
    }
    .ht-pricing__num {
      font-size: 88px;
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .ht-pricing__foot {
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--ink-14, rgba(13,27,62,0.1));
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      font-size: 13px;
      color: var(--ink-70, rgba(13,27,62,0.7));
    }
    .ht-pricing__sep { opacity: 0.4; }
    .ht-pricing__small {
      font-family: 'GT America Mono', 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--ink-70, rgba(13,27,62,0.6));
    }

    /* Add-on callout ---------------------------------------- */
    .rl-addon {
      max-width: 1100px;
      margin: 56px auto 0;
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 24px;
      align-items: start;
      padding: 32px 36px;
      background: linear-gradient(135deg,
        color-mix(in srgb, var(--candle, #E89B8E) 10%, var(--paper)) 0%,
        var(--paper) 70%);
      border: 1px solid var(--ink-14, rgba(13,27,62,0.14));
      border-radius: 14px;
    }
    .pricing--mobile .rl-addon {
      grid-template-columns: 1fr;
      padding: 24px;
      gap: 14px;
      margin-top: 36px;
    }
    .rl-addon__mark {
      font-family: var(--display-font);
      font-size: 56px;
      line-height: 1;
      color: var(--candle, #E89B8E);
      text-align: center;
    }
    .rl-addon__kicker {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ink-70, rgba(13,27,62,0.7));
      margin-bottom: 10px;
    }
    .rl-addon__body h3 {
      font-family: var(--display-font);
      font-weight: 400;
      font-size: clamp(22px, 2vw, 28px);
      line-height: 1.2;
      margin: 0 0 10px;
      color: var(--ink, #0d1b3e);
      letter-spacing: -0.01em;
    }
    .rl-addon__body p {
      font-size: 15px;
      line-height: 1.65;
      max-width: 60ch;
      margin: 0 0 18px;
      color: var(--ink-70, rgba(13,27,62,0.75));
    }
    .rl-addon__links {
      display: flex;
      flex-wrap: wrap;
      gap: 18px 28px;
    }
    .rl-addon__link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink, #0d1b3e);
      text-decoration: none;
      border-bottom: 1px solid var(--ink-14, rgba(13,27,62,0.2));
      padding-bottom: 4px;
      transition: color .25s, border-color .25s;
    }
    .rl-addon__link:hover {
      color: var(--candle, #E89B8E);
      border-color: var(--candle, #E89B8E);
    }

    /* Tab body — allow multiple <p> + citation row ---------- */
    .tabs__body p + p {
      margin-top: 14px;
    }
  </style>
